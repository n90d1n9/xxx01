name: gantt_chart
description: Production-grade Enterprise Gantt Chart — Flutter + Riverpod
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State management — NO build_runner required
  flutter_riverpod: ^2.5.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0

  # File I/O & export
  path_provider: ^2.1.3   # desktop/mobile file paths
  share_plus: ^10.0.0     # share sheet on mobile/web

  # Font — Inter via Google Fonts (no asset bundle needed)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
