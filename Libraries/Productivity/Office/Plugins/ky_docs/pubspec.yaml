name: ky_docs
description: "A new Flutter package project."
version: 0.0.1
publish_to: none
homepage:

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  archive: ">=3.6.1 <5.0.0"
  file_picker: ">=10.2.1 <12.0.0"
  flex_color_picker: ^3.8.0
  flutter:
    sdk: flutter
  flutter_quill: ^11.5.1
  flutter_riverpod: ">=3.0.3 <4.0.0"
  google_fonts: ">=6.3.3 <9.0.0"
  hive_ce_flutter: ^2.3.4
  http: ">=1.3.0 <2.0.0"
  intl: ^0.20.2
  ky_office_core:
    path: ../ky_office_core
  path_provider: ">=2.1.5 <3.0.0"
  pdf: ">=3.11.3 <4.0.0"
  printing: ">=5.14.2 <6.0.0"
  share_plus: ">=11.0.0 <12.0.0"
  uuid: ">=4.5.1 <5.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

