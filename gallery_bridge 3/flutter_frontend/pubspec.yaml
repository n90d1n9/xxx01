name: gallery_bridge
description: Adobe Bridge-inspired media gallery with Rust engine.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Rust bridge ───────────────────────────────────────────────────────────
  flutter_rust_bridge: ^2.3.0

  # ── State management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── UI helpers ───────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # ── File system ──────────────────────────────────────────────────────────
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  path: ^1.9.0

  # ── Utilities ────────────────────────────────────────────────────────────
  intl: ^0.19.0
  equatable: ^2.0.5
  collection: ^1.18.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Platform ─────────────────────────────────────────────────────────────
  window_manager: ^0.3.8   # desktop window controls

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
