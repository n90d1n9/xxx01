# ─── Quarkus Core ──────────────────────────────────────────────────────────────
quarkus.application.name=postfix-manager
quarkus.http.port=8080

# ─── CORS ──────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Content-Disposition

# ─── Database ──────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postfix}
quarkus.datasource.password=${DB_PASS:postfix}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postfix}

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=false

# ─── Postfix Paths ─────────────────────────────────────────────────────────────
postfix.main.cf=${POSTFIX_MAIN_CF:/etc/postfix/main.cf}
postfix.master.cf=${POSTFIX_MASTER_CF:/etc/postfix/master.cf}
postfix.log.file=${POSTFIX_LOG:/var/log/mail.log}
postfix.queue.dir=${POSTFIX_QUEUE:/var/spool/postfix}
postfix.transport.file=${POSTFIX_TRANSPORT:/etc/postfix/transport}
postfix.access.file=${POSTFIX_ACCESS:/etc/postfix/access}
postfix.tls.cert.dir=${POSTFIX_TLS_DIR:/etc/postfix/ssl}
postfix.backup.dir=${POSTFIX_BACKUP_DIR:/var/backups/postfix}

# ─── SmallRye Health ───────────────────────────────────────────────────────────
quarkus.smallrye-health.ui.enable=true

# ─── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
mp.openapi.extensions.smallrye.info.title=PostfixMgr API
mp.openapi.extensions.smallrye.info.version=2.0.0

# ─── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.postfix".level=DEBUG

# ─── Production Profile ────────────────────────────────────────────────────────
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.hibernate-orm.sql-load-script=no-file
