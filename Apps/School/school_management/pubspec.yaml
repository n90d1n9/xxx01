name: school_management
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  adaptive_screen: ^0.1.3
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.3
  crypto: ^3.0.6
  csv: ^6.0.0
  dio: ^5.8.0+1
  encrypt: ^5.0.3
  file_picker: ^9.2.1
  fl_chart: ^0.70.2
  flutter_colorpicker: ^1.1.0
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^19.0.0
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.17
  go_router: ^14.8.1
  image_picker: ^1.1.2
  intl: any
  jwt_decoder: ^2.0.1
  logger: ^2.5.0
  package_info_plus: ^8.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  sembast: ^3.8.4+1
  share_plus: ^10.1.4
  uuid: ^4.5.1
  xxtea: ^2.1.0
  google_fonts: ^6.2.1
  sembast_web: ^2.4.1
  sembast_sqflite: ^2.2.1
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo-golok.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icons/logo-golok.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icons/logo-golok.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icons/logo-golok.png"

# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  generate: true

  # To add assets to your application, add an assets section, like this
  assets:
  - assets/images/
  - assets/icons/
  - assets/fonts/
  - assets/data/
