name: golok
description: Aplikasi generated by Golok

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6

  # LOCALE
  intl: ^0.19.0

  # PLATFORM
  platform: ^3.1.5

  # STATE MANAGEMENT
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # REST 
  dio: ^5.7.0

  # JWT DECODER
  jwt_decoder: ^2.0.1

  # UTILS
  equatable: ^2.0.5
  collection: ^1.18.0
  freezed_annotation: ^2.4.1
  logging: ^1.2.0
  path_provider: ^2.1.1
  url_launcher: ^6.2.2
  # plugin provides an API for querying information about an application package.
  package_info_plus: ^8.1.1

  # ROUTER
  go_router: ^14.4.1
  
  # Adaptive Screen 
  adaptive_screen: ^0.1.3

  # LOCAL DATABASE
  sembast: ^3.7.5+2 

  # ENCRYPTION
  encrypt: ^5.0.3
  
  # IMAGE & ICON
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.9
  flutter_slidable: ^3.1.0
  flutter_secure_storage: ^4.2.1
  crypto: ^3.0.6
  path: ^1.9.0
  uuid: ^4.5.1
  share_plus: ^10.1.2
  #shared_preferences: ^2.3.3
  
dev_dependencies:
  # BUILDER
  build_runner: ^2.4.8
  build_verify: ^3.1.0
  build_version: ^2.1.1

  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  

  # TEST
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

  flutter_launcher_icons: "^0.14.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo-golok.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icons/logo-golok.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icons/logo-golok.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icons/logo-golok.png"

# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  generate: true

  # To add assets to your application, add an assets section, like this
  assets:
  - assets/images/
  - assets/icons/
  - assets/fonts/
  - assets/data/

  fonts:
     - family: RobotoCondensed
       fonts:
         - asset: assets/fonts/RobotoCondensed-Regular.ttf

