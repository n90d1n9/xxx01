name: syirkah
description: "Syirkah Business Enabler Platform"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # LOCALE

  # STATE MANAGEMENT
  # REST 
  # UTILS
  # 

  # 
  json_annotation: ^4.8.0
  # Adaptive Screen 
  adaptive_screen: ^0.1.3

 


  # NETWORK 
  #connectivity_plus: ^5.0.2

  # Kayys Components
  kayys_components:
    path: ../../../../Library_Flutter/kayys_components

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6

  #syncfusion_flutter_charts: ^26.2.13
  #syncfusion_flutter_datagrid: ^26.2.13
  #google_fonts: ^6.2.1

 
  #syncfusion_flutter_pdf: ^26.2.13
  #syncfusion_flutter_xlsio: ^26.2.13
  
  #printing: ^5.12.0
  
  #google_sign_in: ^6.2.1
 
  #image_cropper: ^7.0.4
  flutter_colorpicker: ^1.1.0
  signature: ^5.5.0
  #flutter_image_editor: ^2.1.0
  image_editor: ^1.5.1
  oktoast: ^3.4.0
  #image_size_getter: ^2.1.3
  extended_image: ^8.2.1
  
  image: ^4.2.0
  #flutter_treeview: ^1.0.7+1

  app_links: ^6.1.1
  qr_flutter: ^4.1.0
  share_plus: ^9.0.0
  flutter_staggered_grid_view: ^0.7.0
  pdf: ^3.11.3
  excel: ^4.0.6
  package_info_plus: ^9.0.0
  image_picker: ^1.2.0
  file_picker: ^8.0.7
  fl_chart: ^1.1.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  go_router: ^14.8.1
  equatable: ^2.0.7
  jwt_decoder: ^2.0.1
  flutter_riverpod: ^3.0.3
  platform: ^3.1.6
  dio: ^5.9.0
  sembast: ^3.8.5+1
  xxtea: ^2.1.0
  collection: ^1.19.1
  logging: ^1.3.0
  cached_network_image: ^3.4.0
  flutter_svg: ^2.2.1
  intl: ^0.20.2
  syncfusion_flutter_xlsio: ^29.2.11

dev_dependencies:
  json_serializable: ^6.7.1
  # 
  build_runner: ^2.4.7
  # 
  build_verify: ^3.1.0
  # 
  build_version: ^2.1.1
  # 
  freezed: ^2.3.6
  # 
  flutter_test:
    sdk: flutter
  
  #
  #integration_test:
  #  sdk: flutter
  flutter_lints: ^3.0.0

  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/syirkah-logo-circle.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icons/syirkah-logo-circle.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icons/syirkah-logo-circle.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icons/syirkah-logo-circle.png"

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  generate: true

  assets:
  - assets/images/
  - assets/icons/
  - assets/fonts/
  - assets/data/
  - assets/flags/
  fonts:
     - family: RobotoCondensed
       fonts:
         - asset: assets/fonts/RobotoCondensed-Black.ttf
         - asset: assets/fonts/RobotoCondensed-Regular.ttf
         - asset: assets/fonts/RobotoCondensed-Bold.ttf
         - asset: assets/fonts/RobotoCondensed-Italic.ttf
           style: italic
         - asset: assets/fonts/RobotoCondensed-Thin.ttf
     - family: RobotoFlex
       fonts:
         - asset: assets/fonts/RobotoFlex-Regular.ttf
     - family: Saira
       fonts:
         - asset: assets/fonts/Saira-Black.ttf
         - asset: assets/fonts/Saira-Italic.ttf
           style: italic
         - asset: assets/fonts/Saira-SemiBoldItalic.ttf
           style: italic
         - asset: assets/fonts/Saira-Regular.ttf
           style: italic
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
