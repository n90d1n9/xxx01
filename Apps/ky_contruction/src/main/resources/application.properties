
# Complete application.properties
quarkus.application.name=konstruksi-pms-enterprise
quarkus.application.version=3.0.0

# Database configuration with optimizations
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=konstruksi_user
quarkus.datasource.password=konstruksi_pass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/konstruksi_pms_enterprise
quarkus.datasource.jdbc.min-size=10
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.jdbc.acquisition-timeout=30S

# Hibernate configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=enterprise-data.sql
quarkus.hibernate-orm.packages=com.konstruksi.entity
quarkus.hibernate-orm.jdbc.statement-batch-size=100
quarkus.hibernate-orm.fetch.maximum-size=200
quarkus.hibernate-orm.cache.l2.enabled=true

# Security configuration
quarkus.security.auth.enabled=true
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://konstruksi-pms.com

# HTTP configuration
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.limits.max-body-size=100M

# File upload configuration
quarkus.http.body.handle-file-uploads=true
quarkus.http.body.uploads-directory=/tmp/konstruksi-uploads

# Integration configurations
lpse.integration.enabled=false
lpse.api.base-url=https://lpse.go.id/api/v1

efaktur.integration.enabled=false
efaktur.api.base-url=https://efaktur.pajak.go.id/api

erp.integration.enabled=false
erp.api.base-url=https://your-erp-system.com/api

# Notification configurations
notification.email.enabled=true
notification.whatsapp.enabled=false
notification.sms.enabled=false

# Monitoring and metrics
quarkus.micrometer.registry-enabled-default=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/health

# Logging configuration
quarkus.log.level=INFO
quarkus.log.category."com.konstruksi".level=DEBUG
quarkus.log.file.enable=true
quarkus.log.file.path=logs/konstruksi-pms.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=10

# Scheduled tasks configuration
quarkus.scheduler.enabled=true
quarkus.scheduler.cron-type=quartz

# Cache configuration
quarkus.cache.caffeine.maximum-size=1000
quarkus.cache.caffeine.expire-after-write=30M

# OpenAPI configuration
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.info-title=Indonesian Construction PMS Enterprise API
quarkus.smallrye-openapi.info-version=3.0.0
quarkus.smallrye-openapi.info-description=Complete Enterprise Construction Project Management System

# Performance tuning
quarkus.vertx.event-loops-pool-size=4
quarkus.vertx.worker-pool-size=20
quarkus.vertx.max-event-loop-execute-time=10S
quarkus.vertx.max-worker-execute-time=60S

# Native build configuration (optional)
quarkus.native.container-build=true
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel:22.3-java17
