
# Complete Docker Compose for enterprise deployment
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: konstruksi-postgres
    environment:
      POSTGRES_DB: konstruksi_pms_enterprise
      POSTGRES_USER: konstruksi_user
      POSTGRES_PASSWORD: konstruksi_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - konstruksi-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: konstruksi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - konstruksi-network
    restart: unless-stopped

  app:
    build: 
      context: .
      dockerfile: Dockerfile.enterprise
    container_name: konstruksi-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/konstruksi_pms_enterprise
      QUARKUS_DATASOURCE_USERNAME: konstruksi_user
      QUARKUS_DATASOURCE_PASSWORD: konstruksi_pass
      QUARKUS_HTTP_HOST: 0.0.0.0
      JAVA_OPTS: "-Xmx2g -Xms1g -XX:+UseG1GC"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/tmp/konstruksi-uploads
      - ./logs:/opt/app/logs
    networks:
      - konstruksi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: konstruksi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - konstruksi-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: konstruksi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - konstruksi-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: konstruksi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./uploads:/var/www/uploads
    depends_on:
      - app
    networks:
      - konstruksi-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  konstruksi-network:
    driver: bridge