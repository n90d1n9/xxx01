name: batik_example
description: Example application demonstrating the Batik framework for agent-driven UI generation.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  batik:
    path: ../
  flutter_riverpod: ^2.4.9
  flutter_animate: ^4.3.0
  http: ^1.1.0
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive: ^2.2.3

flutter:
  uses-material-design: true
